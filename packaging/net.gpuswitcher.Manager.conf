<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE busconfig PUBLIC
 "-//freedesktop//DTD D-BUS Bus Configuration 1.0//EN"
 "http://www.freedesktop.org/standards/dbus/1.0/busconfig.dtd">
<busconfig>
  <!-- Deny by default -->
  <policy context="default">
    <deny send_destination="net.gpuswitcher.Manager"/>
    <deny receive_sender="net.gpuswitcher.Manager"/>
  </policy>

  <!-- Allow root (the daemon itself) to own the name and receive calls -->
  <policy user="root">
    <allow own="net.gpuswitcher.Manager"/>
    <allow send_destination="net.gpuswitcher.Manager"/>
    <allow receive_sender="net.gpuswitcher.Manager"/>
  </policy>

  <!-- Allow logged-in console users (the Plasma session user) to call.
       Polkit (net.gpuswitcher.policy) further gates write methods for
       inactive/remote sessions. For active console sessions allow_active=yes
       means no password prompt. -->
  <policy at_console="true">
    <allow send_destination="net.gpuswitcher.Manager"/>
    <allow receive_sender="net.gpuswitcher.Manager"/>
  </policy>
</busconfig>
